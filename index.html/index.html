<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wash Drive Concesio | Autolavaggio professionale</title>
  <meta
    name="description"
    content="Wash Drive Concesio: autolavaggio professionale, lavaggio interno ed esterno, sanificazione, detailing e servizio a domicilio. Prenota su WhatsApp."
  />
  <meta name="theme-color" content="#0f172a" />
  <meta name="format-detection" content="telephone=yes" />

  <meta property="og:title" content="Wash Drive Concesio | Autolavaggio professionale" />
  <meta
    property="og:description"
    content="Servizi professionali per la cura dell’auto: interno, esterno, sanificazione, detailing e prenotazione rapida su WhatsApp."
  />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="it_IT" />
  <meta property="og:image" content="profilo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"
  />

  <style>
    :root{
      --bg: #08111f;
      --bg-soft: #0f172a;
      --panel: rgba(15,23,42,.78);
      --panel-2: rgba(255,255,255,.04);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --muted-2: #94a3b8;
      --line: rgba(255,255,255,.10);
      --primary: #38bdf8;
      --primary-2: #0ea5e9;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 18px;
      --radius-sm: 12px;
      --max: 1180px;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(14,165,233,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(34,197,94,.10), transparent 18%),
        linear-gradient(180deg, #08111f 0%, #0f172a 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    img{ max-width:100%; display:block; }
    a{ color:inherit; }
    button,input,select,textarea{ font:inherit; }

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      backdrop-filter: blur(16px);
      background: rgba(8,17,31,.78);
      border-bottom:1px solid var(--line);
    }

    .topbar-inner{
      min-height:76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      padding:12px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
    }

    .brand-logo{
      width:44px;
      height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: linear-gradient(135deg, var(--primary), #67e8f9);
      color:#082f49;
      box-shadow: 0 10px 25px rgba(56,189,248,.25);
      font-size:20px;
      font-weight:800;
      flex:0 0 auto;
    }

    .brand-text strong{
      display:block;
      font-size:15px;
      letter-spacing:.2px;
    }

    .brand-text span{
      display:block;
      margin-top:2px;
      font-size:12px;
      color:var(--muted);
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn,
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      padding:11px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      color:var(--text);
      text-decoration:none;
      cursor:pointer;
      transition:.22s ease;
      white-space:nowrap;
    }

    .btn:hover,
    .chip:hover{
      transform:translateY(-1px);
      border-color: rgba(56,189,248,.45);
      box-shadow: 0 10px 25px rgba(0,0,0,.18);
    }

    .btn-primary,
    .chip.primary{
      background: linear-gradient(135deg, var(--primary-2), var(--primary));
      border-color: transparent;
      color:#fff;
      box-shadow: 0 10px 30px rgba(14,165,233,.28);
    }

    .btn-success,
    .chip.success{
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border-color: transparent;
      color:#fff;
      box-shadow: 0 10px 30px rgba(34,197,94,.22);
    }

    .btn-ghost{
      background: rgba(255,255,255,.03);
    }

    .hero{
      padding: 58px 0 26px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:28px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(56,189,248,.10);
      border:1px solid rgba(56,189,248,.24);
      color:#bae6fd;
      font-size:13px;
      font-weight:600;
      margin-bottom:18px;
    }

    .hero h1{
      margin:0 0 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height:1.04;
      letter-spacing:-.03em;
    }

    .hero p.lead{
      margin:0 0 22px;
      font-size:18px;
      line-height:1.65;
      color:var(--muted);
      max-width:700px;
    }

    .hero-cta{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .hero-points{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:12px;
      margin-top:8px;
    }

    .hero-point{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:14px 14px;
      background: var(--panel-2);
      border:1px solid var(--line);
      border-radius:16px;
    }

    .hero-point i{
      color:var(--primary);
      margin-top:2px;
    }

    .hero-point span{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .hero-card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:26px;
      padding:24px;
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      inset:auto -20% -30% auto;
      width:220px;
      height:220px;
      background: radial-gradient(circle, rgba(56,189,248,.24), transparent 65%);
      pointer-events:none;
    }

    .profile{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
    }

    .profile img{
      width:78px;
      height:78px;
      border-radius:20px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.14);
    }

    .profile-meta strong{
      display:block;
      font-size:20px;
      margin-bottom:4px;
    }

    .profile-meta span{
      display:block;
      color:var(--muted);
      font-size:14px;
    }

    .hero-links{
      display:grid;
      gap:10px;
      margin-top:16px;
    }

    .hero-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      text-decoration:none;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      transition:.22s ease;
    }

    .hero-link:hover{
      border-color: rgba(56,189,248,.42);
      transform: translateY(-1px);
    }

    .hero-link .left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .hero-link .iconbox{
      width:42px;
      height:42px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background: rgba(56,189,248,.12);
      color:var(--primary);
      flex:0 0 auto;
    }

    .hero-link strong{
      display:block;
      font-size:14px;
    }

    .hero-link span{
      display:block;
      color:var(--muted-2);
      font-size:12px;
      margin-top:2px;
    }

    .kpis{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:14px;
      margin: 18px 0 8px;
    }

    .kpi{
      padding:18px 16px;
      background: rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:18px;
      text-align:left;
    }

    .kpi .n{
      font-size:28px;
      font-weight:800;
      color:#e0f2fe;
      margin-bottom:6px;
    }

    .kpi .t{
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
    }

    .section{
      padding: 44px 0;
    }

    .section-head{
      max-width:760px;
      margin:0 auto 26px;
      text-align:center;
    }

    .section-head h2{
      margin:0 0 10px;
      font-size: clamp(28px, 4vw, 38px);
      letter-spacing:-.02em;
    }

    .section-head p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:16px;
    }

    .cards{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:16px;
    }

    .card{
      padding:22px 18px;
      border-radius:20px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      box-shadow: 0 14px 40px rgba(0,0,0,.12);
      transition:.22s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color: rgba(56,189,248,.34);
    }

    .card-icon{
      width:50px;
      height:50px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: rgba(56,189,248,.12);
      color:var(--primary);
      margin-bottom:14px;
      font-size:20px;
    }

    .card h3{
      margin:0 0 10px;
      font-size:18px;
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }

    .hours-grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:16px;
    }

    .panel{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:22px;
      box-shadow: var(--shadow);
    }

    .panel h3{
      margin:0 0 16px;
      font-size:20px;
    }

    .hour-line{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px dashed rgba(255,255,255,.10);
      color:var(--muted);
      font-size:14px;
    }

    .hour-line:last-child{ border-bottom:none; }

    .status-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .status-live{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:var(--success);
      box-shadow: 0 0 0 6px rgba(34,197,94,.12);
      flex:0 0 auto;
    }

    .dot.off{
      background:var(--danger);
      box-shadow: 0 0 0 6px rgba(239,68,68,.12);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:7px;
      min-height:36px;
      padding:7px 12px;
      border-radius:999px;
      font-size:13px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      color:var(--text);
    }

    .status-copy{
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .status-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .pricing{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:16px;
    }

    .plan{
      position:relative;
      padding:24px 20px;
      border-radius:22px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      transition:.22s ease;
    }

    .plan:hover{
      transform:translateY(-4px);
      border-color: rgba(56,189,248,.34);
    }

    .plan.featured{
      background:
        linear-gradient(180deg, rgba(56,189,248,.14), rgba(255,255,255,.04));
      border-color: rgba(56,189,248,.34);
      box-shadow: 0 18px 45px rgba(14,165,233,.12);
    }

    .plan-badge{
      position:absolute;
      top:16px;
      right:16px;
      padding:6px 10px;
      font-size:11px;
      font-weight:700;
      border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    .plan h3{
      margin:0 0 8px;
      font-size:20px;
    }

    .plan-price{
      margin:0 0 14px;
      font-size:34px;
      font-weight:800;
      color:#e0f2fe;
    }

    .plan-price small{
      font-size:13px;
      color:var(--muted);
      font-weight:500;
    }

    .plan ul{
      list-style:none;
      padding:0;
      margin:0 0 18px;
      display:grid;
      gap:10px;
    }

    .plan li{
      display:flex;
      align-items:flex-start;
      gap:10px;
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
    }

    .plan li i{
      color:var(--success);
      margin-top:3px;
    }

    .plan-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tools{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .searchbox{
      flex:1 1 280px;
      display:flex;
      align-items:center;
      gap:10px;
      min-height:50px;
      padding:0 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
    }

    .searchbox i{ color:var(--primary); }
    .searchbox input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
    }

    .tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .tag{
      min-height:40px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      color:var(--text);
      cursor:pointer;
      transition:.2s ease;
      user-select:none;
      font-size:13px;
    }

    .tag.active,
    .tag:hover{
      background: rgba(56,189,248,.12);
      border-color: rgba(56,189,248,.34);
    }

    .service-list{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:16px;
    }

    .service{
      padding:18px;
      border-radius:18px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      transition:.2s ease;
    }

    .service:hover{
      transform:translateY(-2px);
      border-color: rgba(56,189,248,.30);
    }

    .service-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:10px;
    }

    .service-name{
      display:flex;
      gap:10px;
      align-items:flex-start;
      font-weight:700;
      font-size:16px;
      line-height:1.4;
    }

    .service-name i{
      color:var(--primary);
      margin-top:2px;
    }

    .service-time{
      color:var(--muted-2);
      font-size:13px;
      white-space:nowrap;
    }

    .service p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
    }

    .pillrow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .steps{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:16px;
    }

    .step{
      position:relative;
      padding:22px 18px;
      border-radius:20px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
    }

    .step-no{
      width:36px;
      height:36px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-weight:800;
      color:#082f49;
      background: linear-gradient(135deg, var(--primary), #67e8f9);
      margin-bottom:14px;
    }

    .step h3{
      margin:0 0 10px;
      font-size:18px;
    }

    .step p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
    }

    .carousel{
      border-radius:22px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      overflow:hidden;
    }

    .carousel-inner{
      display:flex;
      transition:transform .4s ease;
    }

    .slide{
      min-width:100%;
      padding:28px 24px 24px;
    }

    .quote{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.8;
      font-size:16px;
    }

    .who{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .stars{
      color:#fbbf24;
    }

    .carousel-controls{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 20px;
      border-top:1px solid var(--line);
      background: rgba(0,0,0,.10);
    }

    .dots{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:center;
      flex:1;
    }

    .cdot{
      width:10px;
      height:10px;
      border-radius:50%;
      border:none;
      background: rgba(255,255,255,.25);
      cursor:pointer;
    }

    .cdot.active{
      background: var(--primary);
      box-shadow: 0 0 0 5px rgba(56,189,248,.12);
    }

    .faq{
      display:grid;
      gap:12px;
      max-width:900px;
      margin:0 auto;
    }

    .faq-item{
      border-radius:18px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      overflow:hidden;
    }

    .faq-item summary{
      list-style:none;
      cursor:pointer;
      padding:18px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:600;
    }

    .faq-item summary::-webkit-details-marker{ display:none; }

    .faq-item .answer{
      padding:0 18px 18px;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .contact-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:16px;
    }

    .contact-card{
      padding:22px;
      border-radius:22px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
    }

    .contact-card h3{
      margin:0 0 14px;
      font-size:20px;
    }

    .contact-line{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin:0 0 10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }

    .contact-line i{
      color:var(--primary);
      margin-top:3px;
    }

    .contact-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .map-section{
      margin-top:18px;
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      min-height:320px;
      background: rgba(255,255,255,.03);
    }

    .map-consent-box{
      min-height:320px;
      display:grid;
      place-items:center;
      text-align:center;
      padding:28px;
    }

    .map-consent-box .inner{
      max-width:520px;
    }

    .map-consent-box i{
      font-size:34px;
      color:var(--primary);
      margin-bottom:12px;
    }

    .map-consent-box p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.7;
    }

    footer{
      margin-top:24px;
      padding:32px 0 42px;
      border-top:1px solid var(--line);
      background: rgba(0,0,0,.12);
    }

    .footer-grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr .9fr;
      gap:18px;
    }

    .footer-box{
      padding:20px;
      border-radius:20px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
    }

    .footer-box h4{
      margin:0 0 14px;
      font-size:16px;
    }

    .footer-box p,
    .footer-box a{
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
      text-decoration:none;
    }

    .footer-links{
      display:grid;
      gap:10px;
